services:
  db:
    image: ankane/pgvector:latest
    container_name: dms-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-documentale}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dms-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  backend:
    build: ./backend
    container_name: dms-backend
    volumes:
      - ./backend:/app
      - ./docker-volumes/documents:/app/storage/documents
      - ./docker-volumes/auto_ingest:/app/auto_ingest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@db:5432/${DB_NAME:-documentale}
      SECRET_KEY: ${SECRET_KEY:-ChangeMeVerySecret}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_ENABLED: ${GEMINI_ENABLED:-true}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  frontend:
    build: ./frontend
    container_name: dms-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  pgdata:
  redis_data:
  documents:
