# SonarQube Configuration

# Project identification
sonar.projectKey=documentale
sonar.projectName=Documentale
sonar.projectVersion=1.0.0
sonar.projectDescription=Document management platform with search and collaboration

# Source code
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src

# Backend specific configuration
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.python.coveragePlugin=cobertura

# Frontend configuration
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.typescript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.javascript.exclusions=**/node_modules/**,**/dist/**

# Code coverage requirements
sonar.coverage.exclusions=\
    **/migrations/**,\
    **/tests/**,\
    **/test/**,\
    **/conftest.py,\
    **/setup.py,\
    frontend/node_modules/**

# Quality gates
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Issues
sonar.issues.include.networklibraries=true

# Metrics
sonar.cpd.cross_project=true

# Analysis parameters
sonar.exclusions=\
    **/*.vue,\
    **/dist/**,\
    **/build/**,\
    **/.venv/**,\
    **/venv/**,\
    **/node_modules/**

# Languages
sonar.lang.patterns.py=**/*.py
sonar.lang.patterns.ts=**/*.ts,**/*.tsx
sonar.lang.patterns.js=**/*.js,**/*.jsx

# Import paths
sonar.import_unknown_extensions=true

# Severity
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=python:S1481
sonar.issue.ignore.multicriteria.e1.resourceKey=**/*

# Performance
sonar.core.default_group=sonar-users
