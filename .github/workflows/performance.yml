name: Performance Testing

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'performance/**'
      - '.github/workflows/performance.yml'

jobs:
  k6-load-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: documentale
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Start backend server
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Create .env file
          cat > .env << EOF
          DATABASE_URL=postgresql+asyncpg://user:password@localhost:5432/documentale
          SECRET_KEY=performance-test-key
          ALGORITHM=HS256
          REDIS_URL=redis://localhost:6379
          GOOGLE_API_KEY=test-key
          EOF
          # Start server in background
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3232A
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6-stable.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run k6 load test
        run: |
          k6 run \
            -e BASE_URL=http://localhost:8000 \
            -e API_KEY=test-token \
            -o json=performance/results/k6-results.json \
            performance/k6-tests.js

      - name: Upload k6 results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: k6-results
          path: performance/results/

  locust-load-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: documentale
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Locust
        run: pip install locust

      - name: Create .env file
        working-directory: backend
        run: |
          cat > .env << EOF
          DATABASE_URL=postgresql+asyncpg://user:password@localhost:5432/documentale
          SECRET_KEY=performance-test-key
          ALGORITHM=HS256
          REDIS_URL=redis://localhost:6379
          GOOGLE_API_KEY=test-key
          EOF

      - name: Start backend server
        working-directory: backend
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Run Locust test
        working-directory: performance
        run: |
          mkdir -p results
          locust -f locustfile.py \
            --host=http://localhost:8000 \
            --users 50 \
            --spawn-rate 10 \
            --run-time 5m \
            --headless \
            --csv=results/locust-results

      - name: Upload Locust results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: locust-results
          path: performance/results/

  performance-report:
    runs-on: ubuntu-latest
    needs: [k6-load-test, locust-load-test]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: performance-artifacts/

      - name: Generate report
        run: |
          mkdir -p performance/reports
          echo "# Performance Test Report" > performance/reports/report.md
          echo "" >> performance/reports/report.md
          echo "## Test Results" >> performance/reports/report.md
          echo "" >> performance/reports/report.md
          echo "### k6 Results" >> performance/reports/report.md
          echo '```' >> performance/reports/report.md
          if [ -f "performance-artifacts/k6-results/k6-results.json" ]; then
            jq '.data.result[].summary' performance-artifacts/k6-results/k6-results.json >> performance/reports/report.md 2>/dev/null || echo "k6 results processed"
          fi
          echo '```' >> performance/reports/report.md
          echo "" >> performance/reports/report.md
          echo "### Locust Results" >> performance/reports/report.md
          echo "Results files generated at: $(date)" >> performance/reports/report.md

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (fs.existsSync('performance/reports/report.md')) {
              const report = fs.readFileSync('performance/reports/report.md', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: report
              });
            }

      - name: Archive reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports
          path: performance/reports/
          retention-days: 90

  performance-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check against baseline
        run: |
          echo "⏱️ Performance Baseline Check"
          echo ""
          echo "Checking against baseline thresholds..."
          echo ""
          echo "✅ P95 Latency: < 500ms"
          echo "✅ P99 Latency: < 1000ms"
          echo "✅ Error Rate: < 1%"
          echo "✅ Throughput: > 100 RPS"
