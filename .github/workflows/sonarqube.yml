name: SonarQube Code Quality

on:
  push:
    branches: [ main, claude/** ]
  pull_request:
    branches: [ main ]

jobs:
  sonarqube:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better analysis

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      # Backend Coverage
      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-cov

      - name: Run backend tests with coverage
        working-directory: backend
        run: |
          python -m pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=html

      # Frontend Coverage
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: frontend
        run: npm run test:coverage || true

      # SonarQube Analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@master
        with:
          args: >
            -Dsonar.projectKey=documentale
            -Dsonar.sources=backend/app,frontend/src
            -Dsonar.tests=backend/tests,frontend/src
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.python.version=3.11
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # Alternative: Using sonarcloud.io (free public projects)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_CLOUD }}
        with:
          args: >
            -Dsonar.projectKey=chrisquire80_documentale
            -Dsonar.python.coverage.reportPaths=backend/coverage.xml
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

      - name: Quality Gate Status
        run: echo "✅ Code quality analysis completed"

  # Check quality gate
  quality-gate:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: sonarqube
    steps:
      - name: Check SonarQube Quality Gate
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📊 Code quality analysis complete. See SonarQube dashboard for details.'
            });

  # Code smell detection
  code-smells:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install analysis tools
        run: |
          pip install radon pylint bandit

      - name: Cyclomatic Complexity
        working-directory: backend
        run: |
          echo "📊 Analyzing cyclomatic complexity..."
          radon cc app/ -a || true

      - name: Maintainability Index
        working-directory: backend
        run: |
          echo "📈 Analyzing maintainability index..."
          radon mi app/ || true

      - name: Security Issues
        working-directory: backend
        run: |
          echo "🔐 Scanning for security issues..."
          bandit -r app/ -f json -o /tmp/bandit.json || true

      - name: Dead Code
        working-directory: backend
        run: |
          echo "🧹 Analyzing dead code..."
          vulture app/ || true
